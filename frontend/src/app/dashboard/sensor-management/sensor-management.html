<div class="flex-1 pt-11 px-4 lg:p-6">

    <!-- Page Header -->
    <div class="mb-6">
        <h1 class="text-2xl font-bold text-gray-800">Sensor Manager</h1>
        <p class="text-sm text-gray-500 mt-1">
            Manage and monitor all connected sensors
        </p>
    </div>

    <!-- Search + Add Button -->
    <div class="flex flex-col sm:flex-row gap-3 sm:items-center sm:justify-between mb-6">

        <!-- Search -->
        <div class="relative w-full sm:max-w-xs">
            <input type="text" placeholder="Search sensor..."
                class="w-full pl-10 pr-4 py-2 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:outline-none bg-white" />
            <svg class="absolute left-3 top-2.5 w-5 h-5 text-gray-400" fill="none" stroke="currentColor"
                stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M21 21l-4.3-4.3m1.3-5.7a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
        </div>

        <!-- Add Button -->
        <button (click)="SensorAdd()"
            class="w-full sm:w-auto px-4 py-2 bg-blue-600 text-white rounded-xl shadow hover:bg-blue-700 active:scale-95 transition">
            + Add Sensor
        </button>

    </div>

    <!-- Sensor List -->
    <div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">

        <!-- Sensor Card -->
        <!-- Sensor Card -->
        <div class="group bg-white rounded-3xl shadow-sm border border-gray-100 p-5 
            hover:shadow-lg hover:-translate-y-1 transition duration-300">

            <!-- Top -->
            <div class="flex justify-between items-start">

                <div>
                    <h2 class="font-semibold text-lg text-gray-800 group-hover:text-blue-600 transition">
                        Temperature Sensor
                    </h2>
                    <p class="text-xs text-gray-400 mt-1">
                        Sensor ID: #001
                    </p>
                </div>
            </div>

            <!-- Divider -->
            <div class="my-4 border-t border-gray-100"></div>

            <!-- Body -->
            <div class="text-sm text-gray-600 space-y-2">
                <div class="flex justify-between">
                    <span class="text-gray-400">Name</span>
                    <span class="font-medium text-gray-700">Room Sensor A</span>
                </div>

                <div class="flex justify-between">
                    <span class="text-gray-400">Created At</span>
                    <span class="font-medium text-gray-700">2 mins ago</span>
                </div>
            </div>

            <!-- Buttons -->
            <div class="mt-5 flex gap-3">

                <button class="flex-1 text-sm py-2.5 rounded-xl border border-red-200 text-red-600
             hover:bg-red-50 active:scale-95 transition">
                    Delete
                </button>

                <button class="flex-1 text-sm py-2.5 rounded-xl bg-blue-600 text-white
             hover:bg-blue-700 active:scale-95 shadow-sm transition">
                    Edit
                </button>

            </div>

        </div>
    </div>

</div>

@if(addSensor()){
<!-- Overlay -->
<div class="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center p-4 z-50">

    <!-- Modal -->
    <div class="w-full max-w-lg bg-white rounded-3xl shadow-xl p-6 animate-fadeIn">

        <!-- Header -->
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-semibold text-gray-800">Add New Sensor</h2>
            <button class="text-gray-400 hover:text-gray-600 text-xl leading-none" (click)="CancelAdd()">
                ✕
            </button>
        </div>

        <!-- Form -->
        <form [formGroup]="sensorForm" (ngSubmit)="OnRequest()">
            <div class="space-y-4">

                <!-- Sensor Name -->
                <div>
                    <label class="block text-sm text-gray-500 mb-1">Sensor Name</label>
                    <input type="text" placeholder="Enter sensor name" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 
                 focus:ring-2 focus:ring-blue-500 focus:outline-none" required formControlName="name" />
                </div>

                <!-- Sensor Type -->
                <div>
                    <label class="block text-sm text-gray-500 mb-1">Sensor Status</label>
                    <select class="w-full px-4 py-2.5 rounded-xl border border-gray-200  
                 focus:ring-2 focus:ring-blue-500 focus:outline-none bg-white" required formControlName="active">
                        <option [ngValue]="true">Active</option>
                        <option [ngValue]="false">Inactive</option>
                    </select>
                </div>


            </div>

            <!-- Buttons -->
            <div class="mt-6 flex flex-col sm:flex-row gap-3 sm:justify-end">

                <button class="w-full sm:w-auto px-5 py-2.5 rounded-xl border border-gray-200
               text-gray-600 hover:bg-gray-100 transition">
                    Cancel
                </button>

                <button class="w-full sm:w-auto px-5 py-2.5 rounded-xl bg-blue-600 text-white
               hover:bg-blue-700 active:scale-95 transition shadow-sm">
                    Save Sensor
                </button>

            </div>
        </form>

    </div>
</div>
}
