<body
  class="min-h-screen bg-gradient-to-b from-[#0a1f3d] via-[#0e2a52] to-[#071427] relative flex items-center justify-center px-4">

  <!-- Background Glow -->
  <!-- Card -->
  <div class="relative w-full max-w-md sm:max-w-lg 
  bg-white/5 backdrop-blur-xl border border-white/10 
  rounded-2xl shadow-2xl 
  px-5 py-8 sm:px-10 sm:py-10">

    <div class="text-center">
      <img src="whaleicon.png" class="hidden lg:block mx-auto h-20 w-auto drop-shadow-lg" />
      <h2 class="mt-6 text-2xl font-bold tracking-tight text-white">
        Create your account
      </h2>
      <p class="mt-2 text-sm text-gray-400">
        Real-time truck monitoring starts here
      </p>
    </div>

    <form class="mt-8 space-y-5" [formGroup]="form">

      <!-- First + Last Name (Responsive Grid) -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-200">First Name</label>
          <input type="text" name="firstName" required formControlName="first_name"
            class="mt-2 block w-full rounded-md bg-white/5 px-3 py-2 text-white outline outline-1 outline-white/10 focus:outline-2 focus:outline-indigo-500 transition" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-200">Last Name</label>
          <input type="text" name="lastName" required formControlName="last_name"
            class="mt-2 block w-full rounded-md bg-white/5 px-3 py-2 text-white outline outline-1 outline-white/10 focus:outline-2 focus:outline-indigo-500 transition" />
        </div>
      </div>

      <!-- Email -->
      <div>
        <label class="block text-sm font-medium text-gray-200">Email</label>
        <input type="email" name="email" required formControlName="email"
          class="mt-2 block w-full rounded-md bg-white/5 px-3 py-2 text-white outline outline-1 outline-white/10 focus:outline-2 focus:outline-indigo-500 transition" />
      </div>

      <!-- Phone -->
      <div>
        <label class="block text-sm font-medium text-gray-200">Phone Number</label>
        <input type="tel" name="phone" required formControlName="phone_number"
          class="mt-2 block w-full rounded-md bg-white/5 px-3 py-2 text-white outline outline-1 outline-white/10 focus:outline-2 focus:outline-indigo-500 transition" />
      </div>

      <!-- Employee ID -->
      <div>
        <label class="block text-sm font-medium text-gray-200">Employee ID</label>
        <input type="text" name="employeeId" required formControlName="employee_id"
          class="mt-2 block w-full rounded-md bg-white/5 px-3 py-2 text-white outline outline-1 outline-white/10 focus:outline-2 focus:outline-indigo-500 transition" />
      </div>

      <!-- Password -->
      <div>
        <label class="block text-sm font-medium text-gray-200">Password</label>
        <input type="password" name="password" required formControlName="password"
          class="mt-2 block w-full rounded-md bg-white/5 px-3 py-2 text-white outline outline-1 outline-white/10 focus:outline-2 focus:outline-indigo-500 transition" />
      </div>

      <!-- Submit -->
      <button type="button" (click)="Onclick()"
        class="w-full rounded-md bg-indigo-600 py-2.5 font-semibold text-white hover:bg-indigo-500 transition shadow-lg shadow-indigo-600/30">
        Sign Up
      </button>
      @if (isShow()){
      <div class="rounded-md bg-red-500/10 border border-red-500/30 p-3">
        <p class="text-sm text-center font-medium text-red-400">
          {{isShow()}}
        </p>
      </div>
      }
    </form>

    <p class="mt-8 text-center text-sm text-gray-400">
      Already have an account?
      <a href="/login" class="font-semibold text-indigo-400 hover:text-indigo-300">
        Sign in
      </a>
    </p>

  </div>

</body>
