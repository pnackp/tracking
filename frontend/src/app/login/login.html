<body class="grid min-h-screen grid-cols-1 lg:grid-cols-[40%_60%]">
    <div class="flex flex-col justify-center px-6 py-12 bg-gradient-to-b from-[#0a1f3d] via-[#0e2a52] to-[#071427]">
        <div class="sm:mx-auto sm:w-full sm:max-w-sm">
            <img src="whaleicon.png" alt="Your Company" class="mx-auto h-20 w-auto" />
            <h1 class="mt-4 text-center text-3xl/9 font-bold tracking-tight text-white">Sign in to your account</h1>
        </div>
        <div class="mt-10 sm:mx-auto sm:w-full sm:max-w-sm">
            <form class="space-y-6" [formGroup]="form">
                <label for="email" class="block text-lg/6 font-medium text-gray-100">Email or Employee ID</label>
                <div class="mt-2">
                    <input id="email" type="text" name="email" formControlName="identifier"
                        class="block w-full rounded-md bg-white/5 px-3 py-1.5 text-base text-white outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-500 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500 sm:text-sm/6" />
                </div>
                <div>
                    <div class="flex items-center justify-between">
                        <label for="password" class="block text-lg/6 font-medium text-gray-100">Password</label>
                        <div class="text-sm">
                            <a href="#" class="font-semibold text-indigo-400 hover:text-indigo-300">Forgot password?</a>
                        </div>
                    </div>
                    <div class="mt-2">
                        <input id="password" type="password" name="password" required autocomplete="current-password"
                            formControlName="password"
                            class="block w-full rounded-md bg-white/5 px-3 py-1.5 text-base text-white outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-500 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500 sm:text-sm/6" />
                    </div>
                </div>
                <div>
                    <button type="button" (click)="Onclick()"
                        class="flex w-full justify-center rounded-md bg-indigo-500 mt-10 px-3 py-1.5 text-sm/6 font-semibold text-white hover:bg-indigo-400 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-500">Sign
                        in</button>
                </div>
                @if (isShow()){
                <div class="rounded-md bg-red-500/10 border border-red-500/30 p-3">
                    <p class="text-sm text-center font-medium text-red-400">
                        {{isShow()}}
                    </p>
                </div>
                }
            </form>
        </div>
        <p class="mt-10 text-center text-sm/6 text-gray-400">
            Not a member?
            <a href="/register" class="font-semibold text-indigo-400 hover:text-indigo-300">Register Here</a>
        </p>

        <p class="mt-5 text-sm text-gray-400 text-center">
            @pnackp , bunbon
        </p>
    </div>

    <div class="hidden lg:block">
        <img src="whale.jpg" class="h-full w-full object-cover" />
    </div>
</body>
